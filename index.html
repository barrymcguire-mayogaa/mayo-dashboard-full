<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COHESION — Team Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{
  --bg:#181820;--panel:#1e1e28;--card:#252530;--hover:#2c2c3a;
  --border:rgba(255,255,255,0.08);--t1:#f0f0f5;--t2:#8888a0;--t3:#52526a;
  --accent:#4fc3f7;--accent-bg:rgba(79,195,247,0.12);
  --shadow:rgba(0,0,0,0.5);--logo-opacity:1;
}
[data-theme="light"]{
  --bg:#f0eeeb;--panel:#ffffff;--card:#f7f6f3;--hover:#ebe9e5;
  --border:rgba(0,0,0,0.1);--t1:#1a1a28;--t2:#555572;--t3:#888899;
  --accent:#0369a1;--accent-bg:rgba(3,105,161,0.08);
  --shadow:rgba(0,0,0,0.15);--logo-opacity:0.9;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t1);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;transition:background .2s,color .2s;
}

/* background texture */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 50%,rgba(79,195,247,0.04) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(0,103,71,0.05) 0%,transparent 50%);
}

.theme-toggle{
  position:fixed;top:20px;right:20px;
  width:38px;height:38px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;transition:all .2s;z-index:10;
}
.theme-toggle:hover{border-color:var(--accent);transform:scale(1.05);}

.login-wrap{
  width:100%;max-width:400px;padding:24px;
  position:relative;z-index:1;
}

.logo-block{text-align:center;margin-bottom:40px;}
.logo-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:48px;letter-spacing:6px;color:var(--t1);
  text-transform:uppercase;line-height:1;
}
.logo-name span{color:var(--accent);}
.logo-sub{
  font-family:'Barlow Condensed',sans-serif;font-weight:300;
  font-size:14px;letter-spacing:5px;color:var(--t3);
  text-transform:uppercase;margin-top:6px;
}
.logo-line{
  width:40px;height:2px;background:var(--accent);
  margin:14px auto 0;opacity:0.6;
}

.card{
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:32px;box-shadow:0 20px 60px var(--shadow);
}
.card-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:15px;letter-spacing:2px;text-transform:uppercase;
  color:var(--t3);margin-bottom:24px;text-align:center;
}

.input-group{position:relative;margin-bottom:12px;}
.input-group input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:13px 16px 13px 44px;
  color:var(--t1);font:500 15px 'Barlow',sans-serif;
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-text-security:disc;
}
.input-group input[type="password"]{letter-spacing:3px;}
.input-group input::placeholder{color:var(--t3);letter-spacing:0;}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.input-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--t3);font-size:16px;pointer-events:none;
}
.show-pw{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--t3);font-size:13px;cursor:pointer;
  background:none;border:none;padding:4px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;
  transition:color .15s;
}
.show-pw:hover{color:var(--accent);}

.error-msg{
  color:#f87171;font-size:12px;text-align:center;
  margin-bottom:10px;min-height:18px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;
}

.login-btn{
  width:100%;padding:13px;border-radius:9px;
  background:var(--accent);color:#fff;
  font:700 14px 'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;
  border:none;cursor:pointer;transition:all .15s;margin-top:4px;
}
[data-theme="light"] .login-btn{color:#fff;}
.login-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px var(--shadow);}
.login-btn:active{transform:translateY(0);}

.footer{
  text-align:center;margin-top:20px;
  font-size:11px;color:var(--t3);letter-spacing:.5px;
  font-family:'Barlow Condensed',sans-serif;
}
</style>
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()" id="themeToggle">☀️</div>

<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-name">CO<span>HE</span>SION</div>
    <div class="logo-sub">Team Analysis</div>
    <div class="logo-line"></div>
  </div>

  <div class="card">
    <div class="card-title">Enter Passcode</div>
    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input type="password" id="passcode" placeholder="Passcode"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="show-pw" onclick="togglePw()" id="showPwBtn">SHOW</button>
    </div>
    <div class="error-msg" id="errMsg"></div>
    <button class="login-btn" onclick="doLogin()">ACCESS COHESION</button>
  </div>

  <div class="footer">COHESION · Team Analysis Platform</div>
</div>

<script>
const VIEWER = 'Mayo2026';
const ADMIN  = 'Analysis_26';

function initTheme(){
  const t = localStorage.getItem('cohesion_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme(){
  const c = document.documentElement.getAttribute('data-theme');
  const n = c === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('cohesion_theme', n);
  document.getElementById('themeToggle').textContent = n === 'dark' ? '☀️' : '🌙';
}
function togglePw(){
  const inp = document.getElementById('passcode');
  const btn = document.getElementById('showPwBtn');
  if(inp.type === 'password'){
    inp.type = 'text'; inp.style.letterSpacing = 'normal'; btn.textContent = 'HIDE';
  } else {
    inp.type = 'password'; inp.style.letterSpacing = '3px'; btn.textContent = 'SHOW';
  }
}
function doLogin(){
  const val = document.getElementById('passcode').value;
  const err = document.getElementById('errMsg');
  if(val === ADMIN){
    sessionStorage.setItem('cohesion_auth','admin');
    window.location.href = 'library.html';
  } else if(val === VIEWER){
    sessionStorage.setItem('cohesion_auth','viewer');
    window.location.href = 'library.html';
  } else {
    err.textContent = 'Incorrect passcode. Please try again.';
    document.getElementById('passcode').value = '';
    setTimeout(()=>err.textContent='', 3000);
  }
}
// Already logged in?
if(sessionStorage.getItem('cohesion_auth')) window.location.href = 'library.html';
initTheme();
</script>
</body>
</html>
